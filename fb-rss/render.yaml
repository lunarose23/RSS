services:
  - type: web
    name: rss
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: playwright install chromium && playwright install-deps chromium && gunicorn app:app --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: ADMIN_PASSWORD
        sync: false        # Set this in Render dashboard — never commit it
      - key: BASE_URL
        sync: false        # Set to your Render app URL e.g. https://rss-ez6l.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /data/data.db
      - key: FEEDS_DIR
        value: /data/feeds
      - key: IMAGES_DIR
        value: /data/images
    disk:
      name: fb-rss-data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /
